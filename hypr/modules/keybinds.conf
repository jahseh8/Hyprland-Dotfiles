# Keybinding Config

$mainMod = SUPER

# Application and Run Launcher
bind = $mainMod, RETURN, exec, kitty $terminal
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit,
bind = $mainMod, F, exec, dolphin
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, rofi -show drun 
bind = $mainMod, J, togglesplit,
bind = $mainMod, S, exec, firefox

# Hypr Scripts
# bind = $mainMod, L,  --> Add hyprlock
# bind = $mainMod SHIFT , Q,  --> Add logout script 


# Rofi Scripts
# bind = $mainMod, R,  --> add rofi launcher script
# bind = $mainMod SHIFT, W,  --> add rofi wallpaper script
# bind = $mainMod CTRL, W,  --> add rofi waybar switcher


# Move Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# Switch Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move Window to Workspaces

bind = $mainMod SHIFT, 1, workspace, 1
bind = $mainMod SHIFT, 2, workspace, 2
bind = $mainMod SHIFT, 3, workspace, 3
bind = $mainMod SHIFT, 4, workspace, 4
bind = $mainMod SHIFT, 5, workspace, 5
bind = $mainMod SHIFT, 6, workspace, 6
bind = $mainMod SHIFT, 7, workspace, 7
bind = $mainMod SHIFT, 8, workspace, 8
bind = $mainMod SHIFT, 9, workspace, 9
bind = $mainMod SHIFT, 0, workspace, 10

# Move/Resize Windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# 
